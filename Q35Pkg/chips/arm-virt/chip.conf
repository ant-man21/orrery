# =============================================================================
# chips/arm-virt/chip.conf — QEMU 'virt' (AArch64) machine config
#
# Build-verification target only for now: compiles Q35Pkg's drivers/apps for
# AARCH64 against upstream ArmVirtQemu.dsc. No run.sh/qemu.sh support yet —
# TpmProvisionApp/TpmVerifyBootApp still hardcode an X64/OVMF flash address
# (see their source), so this chip isn't bootable as-is.
# =============================================================================

# --- EDK2 build settings ------------------------------------------------------
ARCH="AARCH64"
TOOLCHAIN="GCC"
DSC="Q35Pkg/ArmVirt.dsc"
OUTPUT_DIR="Build/ArmVirtQemu-AArch64"

# --- QEMU machine settings (unused until qemu.sh gains AArch64 support) -------
QEMU_MACHINE="virt"
QEMU_CPU="max"
