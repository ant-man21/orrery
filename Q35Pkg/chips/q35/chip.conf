# =============================================================================
# chips/q35/chip.conf — Q35 (Intel ICH9) chipset config
# =============================================================================

# --- EDK2 build settings ------------------------------------------------------
ARCH="X64"
TOOLCHAIN="GCC"
DSC="Q35Pkg/Q35Pkg.dsc"
OUTPUT_DIR="Build/OvmfX64"

# --- QEMU machine settings ----------------------------------------------------
QEMU_MACHINE="q35"        # ICH9 southbridge, PCIe, modern AHCI
# QEMU_CPU="host"           # use host CPU features; change to "max" if no KVM
QEMU_CPU="max"           # use host CPU features; change to "max" if no KVM